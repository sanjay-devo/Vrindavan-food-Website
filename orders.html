<script>
const dbUrl = 'https://vrindavan-website-default-rtdb.firebaseio.com';
const ordersContainer = document.getElementById('ordersContainer');
const loginNavLink = document.getElementById('loginNavLink');
const registerNavLink = document.getElementById('registerNavLink');
const logoutNavLink = document.getElementById('logoutNavLink');
const cartCountEl = document.getElementById('cartCount');
const toastRoot = document.getElementById('toastRoot');

function showToast(message, type = 'success') {
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = message;
  toastRoot.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 200);
  }, 3200);
}

function getCurrentUser() {
  return JSON.parse(localStorage.getItem('vrindavanUser') || 'null');
}

function getCart() {
  const raw = localStorage.getItem('vrindavanCart');
  return raw ? JSON.parse(raw) : [];
}

function saveCart(cart) {
  localStorage.setItem('vrindavanCart', JSON.stringify(cart));
  updateCartCount();
}

function updateCartCount() {
  const count = getCart().reduce((sum, item) => sum + item.quantity, 0);
  if (cartCountEl) cartCountEl.textContent = count;
}

function setNavAuthLinks(user) {
  if (loginNavLink) loginNavLink.style.display = user ? 'none' : '';
  if (registerNavLink) registerNavLink.style.display = user ? 'none' : '';
  if (logoutNavLink) logoutNavLink.style.display = user ? '' : 'none';
}

const openCartButton = document.getElementById('openCartButton');
const closeCartButton = document.getElementById('closeCartButton');
const cartPanel = document.getElementById('cartPanel');
const cartBackdrop = document.getElementById('cartBackdrop');
const cartSidebarItemsEl = document.getElementById('cartItems');
const cartSidebarTotalEl = document.getElementById('cartTotal');
const cartSidebarCheckoutButton = document.getElementById('cartSidebarCheckoutButton');

function toggleCart(open) {
  cartPanel?.classList.toggle('open', open);
  cartBackdrop?.classList.toggle('show', open);
  if (open) renderCartSidebar();
}
window.toggleCart = toggleCart;

function renderCartSidebar() {
  if (!cartSidebarItemsEl) return;
  const cart = getCart();
  cartSidebarItemsEl.innerHTML = '';
  if (!cart.length) {
    cartSidebarItemsEl.innerHTML = '<div class="rounded-[1.5rem] bg-surface p-6 text-zinc-500 text-center">Your cart is empty. Add tasty items from the menu.</div>';
    if (cartSidebarTotalEl) cartSidebarTotalEl.textContent = '₹0.00';
    return;
  }
  let total = 0;
  cart.forEach(item => {
    total += item.price * item.quantity;
    const itemEl = document.createElement('div');
    itemEl.className = 'cart-item-card';
    itemEl.innerHTML = `
      <img src="${item.image}" alt="${item.name}" class="rounded-3xl" />
      <div class="space-y-3">
        <div class="flex items-center justify-between gap-4">
          <div>
            <p class="font-semibold text-zinc-900">${item.name}</p>
            <p class="text-sm text-zinc-500">₹${item.price.toFixed(2)} each</p>
          </div>
          <p class="font-black text-zinc-900">₹${(item.quantity * item.price).toFixed(2)}</p>
        </div>
        <div class="flex flex-wrap items-center gap-2">
          <button type="button" class="px-3 py-1 rounded-full border border-zinc-300 bg-white text-sm" data-action="decrease">-</button>
          <span class="font-semibold">${item.quantity}</span>
          <button type="button" class="px-3 py-1 rounded-full border border-zinc-300 bg-white text-sm" data-action="increase">+</button>
          <button type="button" class="ml-auto text-red-600 font-semibold" data-action="remove">Remove</button>
        </div>
      </div>
    `;
    itemEl.querySelector('[data-action="increase"]')?.addEventListener('click', () => {
      item.quantity += 1;
      saveCart(cart);
      renderCartSidebar();
    });
    itemEl.querySelector('[data-action="decrease"]')?.addEventListener('click', () => {
      item.quantity -= 1;
      if (item.quantity < 1) {
        const index = cart.findIndex(entry => entry.productId === item.productId);
        if (index > -1) cart.splice(index, 1);
      }
      saveCart(cart);
      renderCartSidebar();
    });
    itemEl.querySelector('[data-action="remove"]')?.addEventListener('click', () => {
      const index = cart.findIndex(entry => entry.productId === item.productId);
      if (index > -1) cart.splice(index, 1);
      saveCart(cart);
      renderCartSidebar();
    });
    cartSidebarItemsEl.appendChild(itemEl);
  });
  if (cartSidebarTotalEl) cartSidebarTotalEl.textContent = `₹${total.toFixed(2)}`;
}

openCartButton?.addEventListener('click', () => toggleCart(true));
closeCartButton?.addEventListener('click', () => toggleCart(false));
cartBackdrop?.addEventListener('click', () => toggleCart(false));
cartSidebarCheckoutButton?.addEventListener('click', () => {
  if (window.location.pathname.endsWith('cart.html')) toggleCart(false);
  else window.location.href = 'cart.html';
});

logoutNavLink?.addEventListener('click', event => {
  event.preventDefault();
  localStorage.removeItem('vrindavanUser');
  setNavAuthLinks(null);
  showToast('Logged out successfully', 'success');
  setTimeout(() => window.location.href = 'index.html', 300);
});

function fetchJson(path, options = {}) {
  const url = path.includes('?')
    ? `${dbUrl}${path.replace('?', '.json?')}`
    : `${dbUrl}${path}.json`;
  return fetch(url, {
    headers: { 'Content-Type': 'application/json' },
    ...options
  }).then(async response => {
    if (!response.ok) {
      const errorText = await response.text();
      throw new Error(errorText || 'Network error');
    }
    return response.json();
  });
}

function formatDate(timestamp) {
  try {
    if (!timestamp) return 'N/A';
    const date = new Date(Number(timestamp));
    if (isNaN(date.getTime())) return 'N/A';
    return date.toLocaleString('en-IN', {
      year: 'numeric',
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit'
    });
  } catch (e) {
    return 'N/A';
  }
}

function formatCurrency(amount) {
  return '₹' + (parseFloat(amount || 0).toFixed(2));
}

function getStatusBadgeColor(status) {
  const statusMap = {
    'pending': 'bg-yellow-100 text-yellow-800',
    'preparing': 'bg-blue-100 text-blue-800',
    'ready': 'bg-purple-100 text-purple-800',
    'out_for_delivery': 'bg-orange-100 text-orange-800',
    'delivered': 'bg-green-100 text-green-800',
    'cancelled': 'bg-red-100 text-red-800'
  };
  return statusMap[status?.toLowerCase()] || 'bg-gray-100 text-gray-800';
}

function renderOrders(orders) {
  ordersContainer.innerHTML = '';
  if (!orders.length) {
    ordersContainer.innerHTML = '<div class="text-center text-zinc-500 py-12">No orders yet. Place your first order from the menu.</div>';
    return;
  }
  orders.forEach(order => {
    const card = document.createElement('div');
    card.className = 'rounded-[2rem] border border-zinc-200 p-8 bg-white shadow-lg shadow-black/5';
    const orderId = order.orderId || order.id || 'N/A';
    const statusColor = getStatusBadgeColor(order.status);
    card.innerHTML = `
      <div class="flex flex-col md:flex-row md:justify-between gap-6 mb-6">
        <div>
          <p class="text-sm uppercase tracking-[0.3em] text-zinc-400">Order ID</p>
          <p class="font-bold text-zinc-900 mt-2 font-mono text-sm">${orderId}</p>
        </div>
        <div>
          <p class="text-sm uppercase tracking-[0.3em] text-zinc-400">Status</p>
          <p class="font-bold mt-2 px-3 py-1 rounded-full inline-block text-sm ${statusColor}">${order.status || 'pending'}</p>
        </div>
        <div>
          <p class="text-sm uppercase tracking-[0.3em] text-zinc-400">Total</p>
          <p class="font-bold mt-2 text-zinc-900 text-lg">${formatCurrency(order.total || order.totalAmount || 0)}</p>
        </div>
        <div>
          <p class="text-sm uppercase tracking-[0.3em] text-zinc-400">Date</p>
          <p class="font-bold mt-2 text-zinc-900">${formatDate(order.timestamp || order.createdAt)}</p>
        </div>
      </div>
      <div class="grid gap-4">
        ${order.items && Array.isArray(order.items) ? order.items.map(item => `
          <div class="flex items-center gap-4">
            <img src="${item.image || 'https://via.placeholder.com/80'}" alt="${item.name}" class="w-20 h-20 rounded-3xl object-cover" />
            <div class="flex-1">
              <p class="font-bold text-zinc-900">${item.name}</p>
              <p class="text-zinc-500 text-sm">Qty ${item.quantity} · ${formatCurrency(item.price * item.quantity)}</p>
            </div>
          </div>
        `).join('') : ''}
      </div>
    `;
    ordersContainer.appendChild(card);
  });
}

(async () => {
  const currentUser = getCurrentUser();
  setNavAuthLinks(currentUser);
  updateCartCount();
  if (!currentUser) {
    window.location.href = 'login.html?redirect=orders.html';
    return;
  }

  try {
    // Load all orders and filter by userId
    const allOrdersData = await fetchJson('/orders');
    if (!allOrdersData) {
      renderOrders([]);
      return;
    }
    
    const allOrders = Object.entries(allOrdersData).map(([id, order]) => ({ id, ...order }));
    const userOrders = allOrders.filter(order => order.userId === currentUser.uid);
    
    renderOrders(userOrders.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)));
    
    // Set up real-time listener for order status changes
    const dbUrl = 'https://vrindavan-website-default-rtdb.firebaseio.com';
    const evtSource = new EventSource(`${dbUrl}/orders.json`);
    
    evtSource.addEventListener('put', (event) => {
      // Reload orders when changes detected
      (async () => {
        try {
          const updatedData = await fetchJson('/orders');
          if (updatedData) {
            const updatedOrders = Object.entries(updatedData).map(([id, order]) => ({ id, ...order }));
            const updatedUserOrders = updatedOrders.filter(order => order.userId === currentUser.uid);
            renderOrders(updatedUserOrders.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)));
          }
        } catch (err) {
          console.error('Error updating orders:', err);
        }
      })();
    });
    
    // Clean up on page unload
    window.addEventListener('beforeunload', () => {
      evtSource.close();
    });
    
  } catch (error) {
    console.error('Error loading orders:', error);
    showToast('Unable to load orders', 'error');
  }
})();

// Global variables for search
let allMenuData = [];

// Fuzzy match algorithm with bonus for prefix matches
function fuzzyMatch(searchStr, targetStr) {
  const search = searchStr.toLowerCase();
  const target = targetStr.toLowerCase();
  let searchIdx = 0;
  let targetIdx = 0;
  let score = 0;
  
  while (searchIdx < search.length && targetIdx < target.length) {
    if (search[searchIdx] === target[targetIdx]) {
      score += 1;
      // Bonus for matching at the start of words
      if (targetIdx === 0 || target[targetIdx - 1] === ' ') {
        score += 2;
      }
      searchIdx++;
    }
    targetIdx++;
  }
  
  // If all search chars were found, calculate match quality
  if (searchIdx === search.length) {
    let baseScore = (score / target.length) * 100;
    // For single character searches, boost score if it's a prefix match
    if (search.length === 1 && target[0] === search[0]) {
      baseScore += 20; // Significant boost for first character
    }
    return baseScore;
  }
  return 0; // No match
}

// Load menu items from Firebase
async function loadGlobalMenuData() {
  try {
    const response = await fetch(`${dbUrl}/menu.json`);
    const data = await response.json();
    
    if (data) {
      allMenuData = Object.entries(data).map(([id, item]) => ({
        id,
        name: item.name || '',
        category: item.category || '',
        price: item.price || 0,
        image: item.image || '',
        type: 'item'
      }));
    }
  } catch (error) {
    console.error('Error loading menu data:', error);
  }
}

// Get unique categories
function getUniqueCategories() {
  const categories = [...new Set(allMenuData.map(item => item.category).filter(Boolean))];
  return categories.map(cat => ({ name: cat, type: 'category' }));
}

// Search items and categories
function performGlobalSearch(query) {
  if (!query.trim()) {
    return { items: [], categories: [] };
  }
  
  const searchQuery = query.toLowerCase();
  const itemThreshold = query.length === 1 ? 3 : 15;
  const categoryThreshold = query.length === 1 ? 3 : 15;
  
  // Search items
  const matchedItems = allMenuData
    .map(item => ({
      ...item,
      score: Math.max(
        fuzzyMatch(searchQuery, item.name),
        fuzzyMatch(searchQuery, item.category) * 0.7
      )
    }))
    .filter(item => item.score >= itemThreshold)
    .sort((a, b) => b.score - a.score)
    .slice(0, 8);
  
  // Search categories
  const allCategories = getUniqueCategories();
  const matchedCategories = allCategories
    .map(cat => ({
      ...cat,
      score: fuzzyMatch(searchQuery, cat.name)
    }))
    .filter(cat => cat.score >= categoryThreshold)
    .sort((a, b) => b.score - a.score)
    .slice(0, 5);
  
  return { items: matchedItems, categories: matchedCategories };
}

// Render search results
function renderSearchSuggestions(results) {
  const container = document.getElementById('searchSuggestions');
  
  if (results.items.length === 0 && results.categories.length === 0) {
    container.innerHTML = '<div class="p-8 text-center text-zinc-400"><p class="text-sm">No results found. Try different keywords.</p></div>';
    return;
  }
  
  let html = '';
  
  // Categories section
  if (results.categories.length > 0) {
    html += '<div class="border-b border-zinc-200">';
    html += '<div class="px-4 py-3 bg-zinc-50 text-xs font-bold text-zinc-600 uppercase">Categories</div>';
    results.categories.forEach(cat => {
      html += `
        <button onclick="navigateToCategory('${cat.name}')" class="w-full text-left px-4 py-3 hover:bg-zinc-50 transition-colors flex items-center gap-3">
          <span class="material-symbols-outlined text-sm text-zinc-400">local_dining</span>
          <span class="font-medium text-zinc-900">${cat.name}</span>
        </button>
      `;
    });
    html += '</div>';
  }
  
  // Items section
  if (results.items.length > 0) {
    html += '<div class="border-b border-zinc-200">';
    html += '<div class="px-4 py-3 bg-zinc-50 text-xs font-bold text-zinc-600 uppercase">Items</div>';
    results.items.forEach(item => {
      html += `
        <button onclick="addItemToCart('${item.id}', '${item.name.replace(/'/g, "\\'")}', ${item.price}, '${item.image.replace(/'/g, "\\'")}')" class="w-full text-left px-4 py-3 hover:bg-zinc-50 transition-colors flex items-center gap-3">
          <img src="${item.image}" alt="${item.name}" class="w-10 h-10 rounded-lg object-cover" />
          <div class="flex-1 min-w-0">
            <div class="font-medium text-zinc-900">${item.name}</div>
            <div class="text-xs text-zinc-500">${item.category} · ₹${item.price.toFixed(2)}</div>
          </div>
          <span class="material-symbols-outlined text-sm text-primary">add_shopping_cart</span>
        </button>
      `;
    });
    html += '</div>';
  }
  
  container.innerHTML = html;
}

// Open global search modal
function openGlobalSearch() {
  const modal = document.getElementById('searchModal');
  const backdrop = document.getElementById('searchBackdrop');
  const input = document.getElementById('globalSearchInput');
  
  modal.classList.remove('opacity-0', 'pointer-events-none');
  backdrop.classList.remove('opacity-0', 'pointer-events-none');
  input.focus();
}

// Close global search modal
function closeGlobalSearch() {
  const modal = document.getElementById('searchModal');
  const backdrop = document.getElementById('searchBackdrop');
  const input = document.getElementById('globalSearchInput');
  
  modal.classList.add('opacity-0', 'pointer-events-none');
  backdrop.classList.add('opacity-0', 'pointer-events-none');
  input.value = '';
  
  const suggestions = document.getElementById('searchSuggestions');
  suggestions.innerHTML = '<div class="p-8 text-center text-zinc-400"><p class="text-sm">Start typing to search items and categories...</p></div>';
}

// Handle real-time search input
document.getElementById('globalSearchInput')?.addEventListener('input', (e) => {
  const query = e.target.value;
  if (query.length >= 1) {
    const results = performGlobalSearch(query);
    renderSearchSuggestions(results);
  } else {
    const suggestions = document.getElementById('searchSuggestions');
    suggestions.innerHTML = '<div class="p-8 text-center text-zinc-400"><span class="material-symbols-outlined text-4xl mb-3 block opacity-50">search</span><p class="text-sm">Type even 1 character to see suggestions...</p></div>';
  }
});

// Navigate to item on menu page with highlighting
function navigateToItemMenu(itemId, itemName) {
  sessionStorage.setItem('highlightItemId', itemId);
  window.location.href = 'menu.html?highlight=' + itemId;
  closeGlobalSearch();
}

// Navigate to category on menu page
function navigateToCategory(category) {
  sessionStorage.setItem('autoSelectCategory', category);
  closeGlobalSearch();
  window.location.href = `menu.html?category=${encodeURIComponent(category)}`;
}

// Add item to cart from search
function addItemToCartFromSearch(itemId, itemName, itemPrice, itemImage) {
  const cart = JSON.parse(localStorage.getItem('vrindavanCart') || '[]');
  const existing = cart.find(e => e.productId === itemId);
  
  if (existing) {
    existing.quantity += 1;
  } else {
    cart.push({
      productId: itemId,
      name: itemName,
      price: itemPrice,
      quantity: 1,
      image: itemImage
    });
  }
  
  localStorage.setItem('vrindavanCart', JSON.stringify(cart));
  updateCartCount();
  showToast(`✅ ${itemName} added to cart!`, 'success');
}

// Close modal with Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const modal = document.getElementById('searchModal');
    if (!modal.classList.contains('opacity-0')) {
      closeGlobalSearch();
    }
  }
});

// Navigate to category on menu page
function navigateToCategory(category) {
  closeGlobalSearch();
  window.location.href = `menu.html#category=${encodeURIComponent(category)}`;
}

// Add item to cart from search
function addItemToCart(itemId, itemName, itemPrice, itemImage) {
  const cart = JSON.parse(localStorage.getItem('vrindavanCart') || '[]');
  const existing = cart.find(e => e.productId === itemId);
  
  if (existing) {
    existing.quantity += 1;
  } else {
    cart.push({
      productId: itemId,
      name: itemName,
      price: itemPrice,
      quantity: 1,
      image: itemImage
    });
  }
  
  localStorage.setItem('vrindavanCart', JSON.stringify(cart));
  closeGlobalSearch();
  updateCartCount();
  renderCartSidebar();
  showToast(`${itemName} added to cart`, 'success');
}

// Make functions global
window.openGlobalSearch = openGlobalSearch;
window.closeGlobalSearch = closeGlobalSearch;
window.navigateToCategory = navigateToCategory;
window.addItemToCart = addItemToCart;

// Load global menu data
loadGlobalMenuData();
</script>
