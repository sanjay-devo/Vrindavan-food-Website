<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Your Orders - Vrindavan</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Work+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        surface: "#f8f9fc",
                        background: "#f8f9fc",
                        primary: "#bc0008",
                        secondary: "#7d5700",
                        onSurface: "#191c1e"
                    },
                    fontFamily: {
                        headline: ["Plus Jakarta Sans"],
                        body: ["Work Sans"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .toast { position: fixed; right: 1rem; top: 1rem; min-width: 260px; padding: 1rem 1.25rem; border-radius: 1rem; box-shadow: 0 25px 50px rgba(15, 23, 42, 0.15); color: white; z-index: 9999; transform: translateY(-20px); opacity: 0; pointer-events: none; transition: opacity 200ms ease, transform 200ms ease; }
        .toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .toast-success { background: linear-gradient(135deg,#22c55e,#16a34a); }
        .toast-error { background: linear-gradient(135deg,#ef4444,#b91c1c); }
        .cart-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            opacity: 0;
            visibility: hidden;
            transition: opacity .25s ease, visibility .25s ease;
            z-index: 55;
        }
        .cart-backdrop.show {
            opacity: 1;
            visibility: visible;
        }
        .cart-panel {
            position: fixed;
            top: 0;
            right: 0;
            height: 100vh;
            width: min(420px, 100%);
            max-width: 100%;
            padding: 1.5rem;
            background: #ffffff;
            box-shadow: -24px 0 60px rgba(15, 23, 42, 0.18);
            transform: translateX(100%);
            transition: transform .25s ease;
            z-index: 60;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .cart-panel.open {
            transform: translateX(0);
        }
        .cart-item-card {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 1rem;
            padding: 1rem;
            border-radius: 1.5rem;
            border: 1px solid #e5e7eb;
            background: #f8fafc;
            align-items: center;
        }
        .cart-item-card img {
            width: 72px;
            height: 72px;
            object-fit: cover;
            border-radius: 1rem;
        }
        .cart-item-card button {
            min-width: 32px;
        }
        @media (max-width: 640px) {
            .cart-panel {
                width: 100%;
                padding: 1rem;
            }
            .cart-item-card {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }
        }
    </style>
</head>
<body class="bg-background text-onSurface font-body">
<div id="toastRoot"></div>
<div id="cartBackdrop" class="cart-backdrop" onclick="toggleCart(false)"></div>
<aside id="cartPanel" class="cart-panel">
    <div class="flex items-center justify-between mb-6">
        <div>
            <p class="text-sm uppercase tracking-[0.4em] text-primary font-bold">My Cart</p>
            <h2 class="text-2xl font-bold">Order preview</h2>
        </div>
        <button id="closeCartButton" class="text-zinc-500 hover:text-zinc-900">Close</button>
    </div>
    <div id="cartSidebarAuth" class="mb-6"></div>
    <div id="cartItems" class="space-y-4 overflow-y-auto flex-1"></div>
    <div class="cart-sidebar-footer mt-6 border-t border-zinc-200 pt-6">
        <div class="flex justify-between items-center mb-4">
            <span class="font-semibold text-zinc-700">Total</span>
            <span id="cartTotal" class="text-2xl font-black text-primary">$0.00</span>
        </div>
        <button id="cartSidebarCheckoutButton" class="w-full bg-primary text-white py-4 rounded-full font-bold hover:bg-red-700 transition-all">View Cart</button>
    </div>
</aside>
<nav class="fixed top-0 w-full z-50 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-xl shadow-xl shadow-black/5 dark:shadow-none">
<div class="flex justify-between items-center max-w-7xl mx-auto px-6 h-20">
<div class="text-2xl font-extrabold tracking-tighter text-red-700 dark:text-red-500">Vrindavan</div>
<div class="hidden md:flex space-x-8">
<a class="text-zinc-600 dark:text-zinc-400 font-medium hover:text-red-700 transition-colors" href="index.html">Home</a>
<a class="text-zinc-600 dark:text-zinc-400 font-medium hover:text-red-700 transition-colors" href="menu.html">Menu</a>
<a class="text-zinc-600 dark:text-zinc-400 font-medium hover:text-red-700 transition-colors" href="cart.html">Cart</a>
<a id="loginNavLink" class="text-zinc-600 dark:text-zinc-400 font-medium hover:text-red-700 transition-colors" href="login.html">Login</a>
<a id="registerNavLink" class="text-zinc-600 dark:text-zinc-400 font-medium hover:text-red-700 transition-colors" href="register.html">Register</a>
<a id="logoutNavLink" class="hidden text-zinc-600 dark:text-zinc-400 font-medium hover:text-red-700 transition-colors" href="#">Logout</a>
<a class="text-red-700 dark:text-red-500 font-bold border-b-2 border-red-700 pb-1 transition-colors" href="orders.html">Orders</a>
</div>
<div class="flex items-center space-x-4">
<button class="text-zinc-600 hover:scale-105 transition-all"><span class="material-symbols-outlined">search</span></button>
<div class="relative">
<button id="openCartButton" class="text-zinc-600 hover:scale-105 transition-all"><span class="material-symbols-outlined">shopping_basket</span></button>
<span id="cartCount" class="absolute -top-2 -right-2 bg-primary text-white text-[10px] rounded-full h-4 w-4 flex items-center justify-center">0</span>
</div>
<button id="orderOnlineButton" type="button" onclick="location.href='menu.html'" class="hidden lg:flex items-center bg-primary text-white px-6 py-2 rounded-full font-bold hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined mr-2">phone_in_talk</span>
Order Online
</button>
</div>
</div>
</nav>
<main class="pt-28 pb-20 min-h-screen bg-background">
<section class="max-w-6xl mx-auto px-6 py-16 rounded-[3rem] bg-surface shadow-2xl shadow-black/10">
<div class="text-center mb-12">
<span class="text-primary font-bold text-sm uppercase tracking-[0.4em]">Order History</span>
<h1 class="text-5xl font-headline font-extrabold mt-4">Your past orders</h1>
<p class="text-zinc-600 text-lg mt-4">All your orders are saved securely in Firebase and available anytime.</p>
</div>
<div id="ordersContainer" class="grid gap-8"></div>
</section>
</main>
<script>
const dbUrl = 'https://vrindavan-website-default-rtdb.firebaseio.com';
const ordersContainer = document.getElementById('ordersContainer');
const loginNavLink = document.getElementById('loginNavLink');
const registerNavLink = document.getElementById('registerNavLink');
const logoutNavLink = document.getElementById('logoutNavLink');
const cartCountEl = document.getElementById('cartCount');
const toastRoot = document.getElementById('toastRoot');

function showToast(message, type = 'success') {
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = message;
  toastRoot.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 200);
  }, 3200);
}

function getCurrentUser() {
  return JSON.parse(localStorage.getItem('vrindavanUser') || 'null');
}

function getCart() {
  const raw = localStorage.getItem('vrindavanCart');
  return raw ? JSON.parse(raw) : [];
}

function saveCart(cart) {
  localStorage.setItem('vrindavanCart', JSON.stringify(cart));
  updateCartCount();
}

function updateCartCount() {
  const count = getCart().reduce((sum, item) => sum + item.quantity, 0);
  if (cartCountEl) cartCountEl.textContent = count;
}

function setNavAuthLinks(user) {
  if (loginNavLink) loginNavLink.style.display = user ? 'none' : '';
  if (registerNavLink) registerNavLink.style.display = user ? 'none' : '';
  if (logoutNavLink) logoutNavLink.style.display = user ? '' : 'none';
}

const openCartButton = document.getElementById('openCartButton');
const closeCartButton = document.getElementById('closeCartButton');
const cartPanel = document.getElementById('cartPanel');
const cartBackdrop = document.getElementById('cartBackdrop');
const cartSidebarItemsEl = document.getElementById('cartItems');
const cartSidebarTotalEl = document.getElementById('cartTotal');
const cartSidebarCheckoutButton = document.getElementById('cartSidebarCheckoutButton');

function toggleCart(open) {
  cartPanel?.classList.toggle('open', open);
  cartBackdrop?.classList.toggle('show', open);
  if (open) renderCartSidebar();
}
window.toggleCart = toggleCart;

function renderCartSidebar() {
  if (!cartSidebarItemsEl) return;
  const cart = getCart();
  cartSidebarItemsEl.innerHTML = '';
  if (!cart.length) {
    cartSidebarItemsEl.innerHTML = '<div class="rounded-[1.5rem] bg-surface p-6 text-zinc-500 text-center">Your cart is empty. Add tasty items from the menu.</div>';
    if (cartSidebarTotalEl) cartSidebarTotalEl.textContent = '$0.00';
    return;
  }
  let total = 0;
  cart.forEach(item => {
    total += item.price * item.quantity;
    const itemEl = document.createElement('div');
    itemEl.className = 'cart-item-card';
    itemEl.innerHTML = `
      <img src="${item.image}" alt="${item.name}" class="rounded-3xl" />
      <div class="space-y-3">
        <div class="flex items-center justify-between gap-4">
          <div>
            <p class="font-semibold text-zinc-900">${item.name}</p>
            <p class="text-sm text-zinc-500">$${item.price.toFixed(2)} each</p>
          </div>
          <p class="font-black text-zinc-900">$${(item.quantity * item.price).toFixed(2)}</p>
        </div>
        <div class="flex flex-wrap items-center gap-2">
          <button type="button" class="px-3 py-1 rounded-full border border-zinc-300 bg-white text-sm" data-action="decrease">-</button>
          <span class="font-semibold">${item.quantity}</span>
          <button type="button" class="px-3 py-1 rounded-full border border-zinc-300 bg-white text-sm" data-action="increase">+</button>
          <button type="button" class="ml-auto text-red-600 font-semibold" data-action="remove">Remove</button>
        </div>
      </div>
    `;
    itemEl.querySelector('[data-action="increase"]')?.addEventListener('click', () => {
      item.quantity += 1;
      saveCart(cart);
      renderCartSidebar();
    });
    itemEl.querySelector('[data-action="decrease"]')?.addEventListener('click', () => {
      item.quantity -= 1;
      if (item.quantity < 1) {
        const index = cart.findIndex(entry => entry.productId === item.productId);
        if (index > -1) cart.splice(index, 1);
      }
      saveCart(cart);
      renderCartSidebar();
    });
    itemEl.querySelector('[data-action="remove"]')?.addEventListener('click', () => {
      const index = cart.findIndex(entry => entry.productId === item.productId);
      if (index > -1) cart.splice(index, 1);
      saveCart(cart);
      renderCartSidebar();
    });
    cartSidebarItemsEl.appendChild(itemEl);
  });
  if (cartSidebarTotalEl) cartSidebarTotalEl.textContent = `$${total.toFixed(2)}`;
}

openCartButton?.addEventListener('click', () => toggleCart(true));
closeCartButton?.addEventListener('click', () => toggleCart(false));
cartBackdrop?.addEventListener('click', () => toggleCart(false));
cartSidebarCheckoutButton?.addEventListener('click', () => {
  if (window.location.pathname.endsWith('cart.html')) toggleCart(false);
  else window.location.href = 'cart.html';
});

logoutNavLink?.addEventListener('click', event => {
  event.preventDefault();
  localStorage.removeItem('vrindavanUser');
  setNavAuthLinks(null);
  showToast('Logged out successfully', 'success');
  setTimeout(() => window.location.href = 'index.html', 300);
});

function fetchJson(path, options = {}) {
  const url = path.includes('?')
    ? `${dbUrl}${path.replace('?', '.json?')}`
    : `${dbUrl}${path}.json`;
  return fetch(url, {
    headers: { 'Content-Type': 'application/json' },
    ...options
  }).then(async response => {
    if (!response.ok) {
      const errorText = await response.text();
      throw new Error(errorText || 'Network error');
    }
    return response.json();
  });
}

function formatDate(timestamp) {
  const value = Number(timestamp) || Date.now();
  return new Date(value).toLocaleString();
}

function renderOrders(orders) {
  ordersContainer.innerHTML = '';
  if (!orders.length) {
    ordersContainer.innerHTML = '<div class="text-center text-zinc-500">No orders yet. Place your first order from the menu.</div>';
    return;
  }
  orders.forEach(order => {
    const card = document.createElement('div');
    card.className = 'rounded-[2rem] border border-zinc-200 p-8 bg-white shadow-lg shadow-black/5';
    card.innerHTML = `
      <div class="flex flex-col md:flex-row md:justify-between gap-6 mb-6">
        <div><p class="text-sm uppercase tracking-[0.3em] text-zinc-400">Order ID</p><p class="font-bold text-zinc-900 mt-2">${order.id}</p></div>
        <div><p class="text-sm uppercase tracking-[0.3em] text-zinc-400">Status</p><p class="font-bold mt-2 text-primary">${order.status}</p></div>
        <div><p class="text-sm uppercase tracking-[0.3em] text-zinc-400">Total</p><p class="font-bold mt-2 text-zinc-900">$${order.totalAmount.toFixed(2)}</p></div>
        <div><p class="text-sm uppercase tracking-[0.3em] text-zinc-400">Date</p><p class="font-bold mt-2 text-zinc-900">${formatDate(order.createdAt)}</p></div>
      </div>
      <div class="grid gap-4">
        ${order.items.map(item => `
          <div class="flex items-center gap-4">
            <img src="${item.image}" alt="${item.name}" class="w-20 h-20 rounded-3xl object-cover" />
            <div>
              <p class="font-bold text-zinc-900">${item.name}</p>
              <p class="text-zinc-500 text-sm">Qty ${item.quantity} · $${item.price.toFixed(2)}</p>
            </div>
          </div>
        `).join('')}
      </div>
    `;
    ordersContainer.appendChild(card);
  });
}

(async () => {
  const currentUser = getCurrentUser();
  setNavAuthLinks(currentUser);
  updateCartCount();
  if (!currentUser) {
    window.location.href = 'login.html?redirect=orders.html';
    return;
  }

  try {
    const data = await fetchJson(`/orders/${currentUser.uid}`);
    if (!data) {
      renderOrders([]);
      return;
    }
    const orders = Object.entries(data).map(([id, order]) => ({ id, ...order }));
    renderOrders(orders.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)));
  } catch (error) {
    console.error(error);
    showToast('Unable to load orders', 'error');
  }
})();
</script>
</body></html>
